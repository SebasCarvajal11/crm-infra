apiVersion: 1

datasources:
  # Prometheus — métricas de los servicios (/metrics endpoint)
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false

  # Loki — logs centralizados de todos los contenedores
  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    isDefault: false
    editable: false
    jsonData:
      maxLines: 1000
