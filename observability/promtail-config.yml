server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker-containers
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 15s
        filters:
          - name: label
            values: ["logging=promtail"]
    relabel_configs:
      # Usar el label LOG_SERVICE_NAME del contenedor como etiqueta `service`
      - source_labels: [__meta_docker_container_label_LOG_SERVICE_NAME]
        target_label: service
      # Fallback: nombre del contenedor si LOG_SERVICE_NAME no está definido
      - source_labels: [__meta_docker_container_name]
        target_label: container_name
      # Incluir el nombre de la imagen como etiqueta adicional
      - source_labels: [__meta_docker_container_label_com_docker_compose_service]
        target_label: compose_service
