name: Reusable CI

on:
  workflow_call:
    inputs:
      component:
        required: true
        type: string
      language:
        required: false
        type: string
        default: "typescript"
      runs_db:
        required: false
        type: boolean
        default: false
      runs_redis:
        required: false
        type: boolean
        default: false
      db_schema:
        required: false
        type: string
        default: ""
      test_command:
        required: false
        type: string
        default: ""
      install_hurl:
        required: false
        type: boolean
        default: false
      is_frontend:
        required: false
        type: boolean
        default: false
      build_tool:
        required: false
        type: string
        default: "gradle"


env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: root
          POSTGRES_PASSWORD: rootpassword
          POSTGRES_DB: crm_database
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U root -d crm_database"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    env:
      DATABASE_URL: postgres://root:rootpassword@127.0.0.1:5432/crm_database
      REDIS_URL: redis://127.0.0.1:6379
      DB_SCHEMA: schema_${{ inputs.component }}
      NODE_ENV: test
      CIMA_GITHUB_TOKEN: ${{ secrets.CIMA_GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── TypeScript Setup ──────────────────────────────────────
      - name: Setup pnpm
        if: inputs.language == 'typescript'
        uses: pnpm/action-setup@v6
        with:
          version: 11.1.1

      - name: Setup Node.js
        if: inputs.language == 'typescript'
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      # ── Java Setup ────────────────────────────────────────────
      - name: Setup Java
        if: inputs.language == 'java'
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: ${{ inputs.build_tool }}

      # ── Install Dependencies ──────────────────────────────────
      - name: Install dependencies (TypeScript)
        if: inputs.language == 'typescript'
        run: pnpm install --frozen-lockfile

      - name: Install dependencies (Java Gradle)
        if: inputs.language == 'java' && inputs.build_tool == 'gradle'
        run: ./gradlew dependencies --no-daemon

      - name: Install dependencies (Java Maven)
        if: inputs.language == 'java' && inputs.build_tool == 'maven'
        run: chmod +x mvnw && ./mvnw dependency:resolve --no-transfer-progress

      # ── Security Scans ────────────────────────────────────────
      - name: Audit dependencies for vulnerabilities
        if: ${{ !inputs.is_frontend && inputs.language == 'typescript' }}
        run: pnpm audit --audit-level high || true
        continue-on-error: true

      - name: Run Trivy vulnerability scanner (filesystem)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

      # ── Hurl (contract tests) ─────────────────────────────────
      - name: Install Hurl
        if: ${{ inputs.install_hurl }}
        shell: bash
        run: |
          HURL_VERSION=7.1.0
          sudo apt-get update
          curl --location --remote-name "https://github.com/Orange-OpenSource/hurl/releases/download/${HURL_VERSION}/hurl_${HURL_VERSION}_amd64.deb"
          sudo apt-get install -y "./hurl_${HURL_VERSION}_amd64.deb"

      # ── Environment Files ─────────────────────────────────────
      - name: Create CI env file for Auth
        if: ${{ inputs.component == 'auth' && inputs.language == 'typescript' }}
        shell: bash
        run: |
          node -e "
          const fs = require('node:fs');
          const { generateKeyPairSync } = require('node:crypto');
          const { privateKey, publicKey } = generateKeyPairSync('rsa', {
            modulusLength: 2048,
            publicKeyEncoding: { type: 'spki', format: 'pem' },
            privateKeyEncoding: { type: 'pkcs8', format: 'pem' },
          });
          const esc = (pem) => JSON.stringify(pem.trimEnd());
          const lines = [
            'DATABASE_URL=postgres://root:rootpassword@127.0.0.1:5432/crm_database',
            'DB_SCHEMA=schema_auth',
            'REDIS_URL=redis://127.0.0.1:6379',
            'NODE_ENV=test',
            'EXPOSE_TEMP_PASSWORDS=true',
            'PORT=3000',
            'REFRESH_COOKIE_PATH=/api/v1/auth/refresh',
            'MAIL_TRANSPORT=log',
            'APP_PUBLIC_URL=http://localhost:5173',
            'ADMIN_INVITE_SECRET=test-admin-secret-123',
            \`JWT_PRIVATE_KEY=\${esc(privateKey)}\`,
            \`JWT_PUBLIC_KEY=\${esc(publicKey)}\`,
            'JWT_KID=mod-auth-rsa-1',
          ];
          fs.writeFileSync('.env', lines.join('\n') + '\n');
          "

      - name: Create CI env file for Collab
        if: ${{ inputs.component == 'collab' && inputs.language == 'typescript' }}
        shell: bash
        run: |
          node -e "
          const fs = require('node:fs');
          const { generateKeyPairSync } = require('node:crypto');
          const { privateKey, publicKey } = generateKeyPairSync('rsa', {
            modulusLength: 2048,
            publicKeyEncoding: { type: 'spki', format: 'pem' },
            privateKeyEncoding: { type: 'pkcs8', format: 'pem' },
          });
          const esc = (pem) => JSON.stringify(pem.trimEnd());
          const lines = [
            'DATABASE_URL=postgres://root:rootpassword@127.0.0.1:5432/crm_database',
            'DB_SCHEMA=schema_collab',
            'REDIS_URL=redis://127.0.0.1:6379',
            'NODE_ENV=test',
            'PORT=3001',
            'TRUST_GATEWAY_JWT_HEADERS=true',
            \`SERVICE_JWT_PRIVATE_KEY=\${esc(privateKey)}\`,
            \`SERVICE_JWT_PUBLIC_KEY=\${esc(publicKey)}\`,
            'SERVICE_JWT_KID=collab-service-rsa-1',
          ];
          fs.writeFileSync('.env', lines.join('\n') + '\n');
          "

      - name: Create CI env file for Media
        if: ${{ inputs.component == 'media' && inputs.language == 'typescript' }}
        shell: bash
        run: |
          node -e "
          const fs = require('node:fs');
          const os = require('node:os');
          const path = require('node:path');
          const { generateKeyPairSync } = require('node:crypto');
          const { privateKey } = generateKeyPairSync('rsa', {
            modulusLength: 2048,
            publicKeyEncoding: { type: 'spki', format: 'pem' },
            privateKeyEncoding: { type: 'pkcs8', format: 'pem' },
          });
          const ociDir = fs.mkdtempSync(path.join(os.tmpdir(), 'cima-oci-'));
          const keyPath = path.join(ociDir, 'oci_api_key.pem');
          const configPath = path.join(ociDir, 'oci.config');
          fs.writeFileSync(keyPath, privateKey);
          fs.writeFileSync(configPath, [
            '[DEFAULT]',
            'user=ocid1.user.oc1..placeholder',
            'fingerprint=aa:bb:cc:dd:ee:ff:00:11:22:33:44:55:66:77:88:99',
            'tenancy=ocid1.tenancy.oc1..placeholder',
            'region=us-sanjose-1',
            \`key_file=\${keyPath}\`,
          ].join('\\n') + '\\n');
          const lines = [
            'DATABASE_URL=postgres://root:rootpassword@127.0.0.1:5432/crm_database',
            'DB_SCHEMA=schema_media',
            'NODE_ENV=test',
            'PORT=3002',
            'TRUST_GATEWAY_JWT_HEADERS=true',
            'OCI_CONFIG_FILE_PATH=' + configPath,
            'OCI_CONFIG_PROFILE=DEFAULT',
            'OCI_REGION=us-sanjose-1',
            'OCI_NAMESPACE=placeholder',
            'OCI_BUCKET_AVATARS_PUBLIC=crm-avatars-public',
            'OCI_BUCKET_DOCS_PRIVATE=crm-docs-private',
            'CLAMAV_HOST=127.0.0.1',
            'CLAMAV_PORT=3310',
            'MOD_COLLAB_URL=http://127.0.0.1:3001',
          ];
          fs.writeFileSync('.env', lines.join('\n') + '\n');
          "

      - name: Create CI env file for Auth (Java)
        if: ${{ inputs.component == 'auth' && inputs.language == 'java' }}
        shell: bash
        run: |
          openssl genrsa -out private.pem 2048
          openssl rsa -in private.pem -pubout -out public.pem
          PRIVATE_KEY=$(cat private.pem | sed ':a;N;$!ba;s/\n/\\n/g')
          PUBLIC_KEY=$(cat public.pem | sed ':a;N;$!ba;s/\n/\\n/g')
          cat > .env << EOF
          DATABASE_URL=postgres://root:rootpassword@127.0.0.1:5432/crm_database
          REDIS_URL=redis://127.0.0.1:6379
          SPRING_PROFILES_ACTIVE=test
          SERVER_PORT=3000
          JWT_PRIVATE_KEY=${PRIVATE_KEY}
          JWT_PUBLIC_KEY=${PUBLIC_KEY}
          JWT_KID=mod-auth-rsa-1
          EOF

      - name: Create generic CI env file
        if: ${{ inputs.runs_db && inputs.component != 'auth' }}
        shell: bash
        run: |
          echo "DATABASE_URL=postgres://root:rootpassword@127.0.0.1:5432/crm_database" > .env
          echo "REDIS_URL=redis://127.0.0.1:6379" >> .env
          echo "DB_SCHEMA=schema_${{ inputs.component }}" >> .env
          echo "NODE_ENV=test" >> .env

      # ── Lint ──────────────────────────────────────────────────
      - name: Lint (TypeScript)
        if: ${{ inputs.is_frontend && inputs.language == 'typescript' }}
        run: pnpm lint

      # ── Build ─────────────────────────────────────────────────
      - name: Build (TypeScript)
        if: inputs.language == 'typescript'
        run: pnpm build

      - name: Build (Java Gradle)
        if: inputs.language == 'java' && inputs.build_tool == 'gradle'
        run: ./gradlew build -x test --no-daemon

      - name: Build (Java Maven)
        if: inputs.language == 'java' && inputs.build_tool == 'maven'
        run: chmod +x mvnw && ./mvnw clean package -DskipTests --no-transfer-progress

      # ── Validations ───────────────────────────────────────────
      - name: Validate gateway manifest
        if: ${{ !inputs.is_frontend && inputs.language == 'typescript' }}
        run: pnpm gateway:validate

      - name: Validate OpenAPI contract
        if: ${{ !inputs.is_frontend && inputs.language == 'typescript' }}
        run: pnpm openapi:check

      - name: Prepare schema (TypeScript)
        if: ${{ inputs.runs_db && inputs.language == 'typescript' }}
        run: pnpm db:push

      - name: Prepare schema (Java Gradle)
        if: ${{ inputs.runs_db && inputs.language == 'java' && inputs.build_tool == 'gradle' }}
        run: ./gradlew flywayMigrate --no-daemon

      - name: Prepare schema (Java Maven)
        if: ${{ inputs.runs_db && inputs.language == 'java' && inputs.build_tool == 'maven' }}
        shell: bash
        run: |
          if grep -q "flyway" pom.xml; then
            chmod +x mvnw && ./mvnw flyway:migrate --no-transfer-progress
          else
            echo "No Flyway detected in pom.xml. Skipping schema migration step."
          fi

      # ── Tests ─────────────────────────────────────────────────
      - name: Run test suite (TypeScript)
        if: inputs.language == 'typescript'
        run: ${{ inputs.test_command || 'pnpm test:unit' }}

      - name: Run test suite (Java Gradle)
        if: inputs.language == 'java' && inputs.build_tool == 'gradle'
        run: ${{ inputs.test_command || './gradlew test --no-daemon' }}

      - name: Run test suite (Java Maven)
        if: inputs.language == 'java' && inputs.build_tool == 'maven'
        run: chmod +x mvnw && ${{ inputs.test_command || './mvnw test --no-transfer-progress' }}

      # ── Docker Build & Scan ───────────────────────────────────
      - name: Build production image
        run: docker build -t crm-${{ inputs.component }}:ci .

      - name: Run Trivy vulnerability scanner (Docker image)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'crm-${{ inputs.component }}:ci'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: 'crm-${{ inputs.component }}:ci'
          format: 'spdx-json'
          output-file: 'sbom-${{ inputs.component }}.spdx.json'

      - name: Upload SBOM as artifact
        uses: actions/upload-artifact@v6
        with:
          name: sbom-${{ inputs.component }}
          path: sbom-${{ inputs.component }}.spdx.json
          retention-days: 90
