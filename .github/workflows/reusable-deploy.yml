name: Reusable Deploy

on:
  workflow_call:
    inputs:
      component:
        description: Production component to deploy
        required: true
        type: string
      deploy_branch:
        description: Git branch to deploy
        required: false
        default: main
        type: string
    secrets:
      DEPLOY_SSH_HOST:
        required: true
      DEPLOY_SSH_PORT:
        required: true
      DEPLOY_SSH_USER:
        required: true
      DEPLOY_SSH_PRIVATE_KEY:
        required: true
      DEPLOY_BASE_DIR:
        required: true

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: production

    steps:
      - name: Prepare SSH key
        shell: bash
        env:
          DEPLOY_SSH_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
          DEPLOY_SSH_PORT: ${{ secrets.DEPLOY_SSH_PORT }}
          DEPLOY_SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${DEPLOY_SSH_PORT:-22}" -H "$DEPLOY_SSH_HOST" >> ~/.ssh/known_hosts

      - name: Bootstrap and deploy
        shell: bash
        env:
          COMPONENT: ${{ inputs.component }}
          DEPLOY_BRANCH: ${{ inputs.deploy_branch }}
          DEPLOY_BASE_DIR: ${{ secrets.DEPLOY_BASE_DIR }}
          DEPLOY_SSH_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
          DEPLOY_SSH_PORT: ${{ secrets.DEPLOY_SSH_PORT }}
          DEPLOY_SSH_USER: ${{ secrets.DEPLOY_SSH_USER }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
        run: |
          ssh -i ~/.ssh/id_ed25519 -p "${DEPLOY_SSH_PORT:-22}" -o StrictHostKeyChecking=yes "$DEPLOY_SSH_USER@$DEPLOY_SSH_HOST" \
            "set -euo pipefail; \
            mkdir -p '$DEPLOY_BASE_DIR'; \
            if [ ! -d '$DEPLOY_BASE_DIR/crm-infra/.git' ]; then \
              git clone 'https://github.com/$GITHUB_REPOSITORY_OWNER/crm-infra.git' '$DEPLOY_BASE_DIR/crm-infra'; \
            fi; \
            git -C '$DEPLOY_BASE_DIR/crm-infra' fetch --prune origin '$DEPLOY_BRANCH'; \
            git -C '$DEPLOY_BASE_DIR/crm-infra' checkout --force -B '$DEPLOY_BRANCH' 'origin/$DEPLOY_BRANCH'; \
            chmod +x '$DEPLOY_BASE_DIR/crm-infra/deploy/remote/bootstrap-server.sh' '$DEPLOY_BASE_DIR/crm-infra/deploy/remote/deploy-component.sh'; \
            export DEPLOY_BASE_DIR='$DEPLOY_BASE_DIR'; \
            export DEPLOY_BRANCH='$DEPLOY_BRANCH'; \
            export GITHUB_OWNER='$GITHUB_REPOSITORY_OWNER'; \
            bash '$DEPLOY_BASE_DIR/crm-infra/deploy/remote/bootstrap-server.sh'; \
            bash '$DEPLOY_BASE_DIR/crm-infra/deploy/remote/deploy-component.sh' '$COMPONENT'"
