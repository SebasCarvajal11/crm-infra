name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: crm-infra

jobs:
  gateway-build:
    runs-on: ubuntu-latest
    env:
      POSTGRES_PASSWORD: ci-postgres-password
      POSTGRES_USER: root
      POSTGRES_DB: crm_database
      AUTH_DB_PASSWORD: authpassword
      COLLAB_DB_PASSWORD: collabpassword
      MEDIA_DB_PASSWORD: mediapassword
      REDIS_HOST_PORT: "6379"
      CLAMAV_HOST_PORT: "3310"
      GATEWAY_HOST_PORT: "8080"
      FRONTEND_HOST_PORT: "80"
      POSTGRES_HOST_PORT: "5432"
      GATEWAY_TRUST_SECRET: ci-gateway-trust-secret-minimum-32-bytes
      KRAKEND_AUTH_HOST: http://auth:3000
      KRAKEND_COLLAB_HOST: http://collab:3001
      KRAKEND_MEDIA_HOST: http://media:3002
      KRAKEND_ENDPOINTS_SOURCE: file
      OCI_CONFIG_HOST_DIR: /tmp/oci
      OCI_CONFIG_CONTAINER_DIR: /app/.oci
      APP_SLOT: blue
      GATEWAY_SLOT_HOST_PORT: "18081"
      FRONTEND_SLOT_HOST_PORT: "8081"

    steps:
      - name: Checkout infra
        uses: actions/checkout@v6
        with:
          path: crm-infra

      - name: Checkout auth gateway config
        uses: actions/checkout@v6
        with:
          repository: SebasCarvajal11/crm-auth
          path: crm-auth
          sparse-checkout: |
            gateway
            .env.production.example
          sparse-checkout-cone-mode: false

      - name: Checkout collab gateway config
        uses: actions/checkout@v6
        with:
          repository: SebasCarvajal11/crm-collab
          path: crm-collab
          sparse-checkout: |
            gateway
            .env.production.example
          sparse-checkout-cone-mode: false

      - name: Checkout media gateway config
        uses: actions/checkout@v6
        with:
          repository: SebasCarvajal11/crm-media
          path: crm-media
          sparse-checkout: |
            gateway
            .env.production.example
          sparse-checkout-cone-mode: false

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.1.1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: crm-infra/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate deploy shell scripts
        run: |
          docker run --rm -v "${{ github.workspace }}/crm-infra/deploy/remote/bootstrap-server.sh:/bootstrap.sh:ro" bash:5 bash -n /bootstrap.sh
          docker run --rm -v "${{ github.workspace }}/crm-infra/deploy/remote/deploy-component.sh:/deploy.sh:ro" bash:5 bash -n /deploy.sh

      - name: Checkout frontend env template
        uses: actions/checkout@v6
        with:
          repository: SebasCarvajal11/crm-frontend
          path: crm-frontend
          sparse-checkout: |
            .env.production.example
          sparse-checkout-cone-mode: false

      - name: Prepare production env files
        shell: bash
        run: |
          cp .env.production.example .env.production
          cp ../crm-auth/.env.production.example ../crm-auth/.env.production
          cp ../crm-collab/.env.production.example ../crm-collab/.env.production
          cp ../crm-media/.env.production.example ../crm-media/.env.production
          cp ../crm-frontend/.env.production.example ../crm-frontend/.env.production
          cp ../crm-auth/.env.production.example ../crm-auth/.env
          cp ../crm-collab/.env.production.example ../crm-collab/.env
          cp ../crm-media/.env.production.example ../crm-media/.env
          mkdir -p deploy/runtime
          cat > deploy/runtime/edge.conf <<'EOF'
          server {
              listen 80;
              server_name _;
              location / {
                  return 200 'edge-ready';
                  add_header Content-Type text/plain;
              }
          }
          EOF
          cat > deploy/runtime/auth.blue.env <<'EOF'
          DATABASE_URL=postgres://auth_user:authpassword@postgres_db:5432/crm_database
          REDIS_URL=redis://redis:6379
          DB_SCHEMA=schema_auth
          GATEWAY_TRUST_SECRET=ci-gateway-trust-secret-minimum-32-bytes
          EOF
          cat > deploy/runtime/collab.blue.env <<'EOF'
          DATABASE_URL=postgres://collab_user:collabpassword@postgres_db:5432/crm_database
          DB_SCHEMA=schema_collab
          GATEWAY_TRUST_SECRET=ci-gateway-trust-secret-minimum-32-bytes
          MEDIA_COMMANDS_STREAM_KEY=media:commands
          MEDIA_RESPONSES_STREAM_KEY=media:responses
          MEDIA_RESPONSES_CONSUMER_GROUP=collab-media-response-consumers
          MEDIA_COMMAND_TIMEOUT_MS=8000
          JWKS_URI=http://auth:3000/.well-known/jwks.json
          EOF
          cat > deploy/runtime/media.blue.env <<'EOF'
          DATABASE_URL=postgres://media_user:mediapassword@postgres_db:5432/crm_database
          REDIS_URL=redis://redis:6379
          DB_SCHEMA=schema_media
          GATEWAY_TRUST_SECRET=ci-gateway-trust-secret-minimum-32-bytes
          CLAMAV_HOST=clamav-scanner
          CLAMAV_PORT=3310
          MOD_COLLAB_URL=http://collab:3001
          MEDIA_COMMANDS_STREAM_KEY=media:commands
          MEDIA_RESPONSES_STREAM_KEY=media:responses
          MEDIA_COMMANDS_CONSUMER_GROUP=media-command-consumers
          EOF

      - name: Build KrakenD config
        env:
          GATEWAY_TRUST_SECRET: ci-gateway-trust-secret-minimum-32-bytes
          KRAKEND_AUTH_HOST: http://auth:3000
          KRAKEND_COLLAB_HOST: http://collab:3001
          KRAKEND_MEDIA_HOST: http://media:3002
          KRAKEND_ENDPOINTS_SOURCE: file
          KRAKEND_PORT: "8080"
        run: pnpm gateway:build --output deploy/runtime/krakend.blue.json

      - name: Validate Docker Compose
        run: docker compose -f docker-compose.yml config > /dev/null

      - name: Validate production Shared Compose
        run: docker compose -f docker-compose.prod.yml config > /dev/null

      - name: Validate production Slot Compose
        run: docker compose -f docker-compose.slot.prod.yml config > /dev/null

      - name: Assert runtime gateway config
        run: test -f deploy/runtime/krakend.blue.json
