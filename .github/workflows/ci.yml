name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  gateway-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.1.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build KrakenD config
        run: pnpm gateway:build

      - name: Validate Docker Compose
        run: docker compose -f docker-compose.yml config > /dev/null

      - name: Assert generated OpenAPI
        run: test -f gateway/output/openapi.yaml
