name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: crm-infra

jobs:
  gateway-build:
    runs-on: ubuntu-latest
    env:
      POSTGRES_PASSWORD: ci-postgres-password
      REDIS_HOST_PORT: "6379"
      CLAMAV_HOST_PORT: "3310"
      FRONTEND_HOST_PORT: "80"
      POSTGRES_HOST_PORT: "5432"
      APP_SLOT: blue
      GATEWAY_SLOT_HOST_PORT: "18081"
      FRONTEND_SLOT_HOST_PORT: "8081"

    steps:
      - name: Checkout infra
        uses: actions/checkout@v4
        with:
          path: crm-infra

      - name: Checkout auth
        uses: actions/checkout@v4
        with:
          repository: SebasCarvajal11/crm-auth
          path: crm-auth

      - name: Checkout collab
        uses: actions/checkout@v4
        with:
          repository: SebasCarvajal11/crm-collab
          path: crm-collab

      - name: Checkout media
        uses: actions/checkout@v4
        with:
          repository: SebasCarvajal11/crm-media
          path: crm-media

      - name: Checkout frontend
        uses: actions/checkout@v4
        with:
          repository: SebasCarvajal11/crm-frontend
          path: crm-frontend

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.1.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: crm-infra/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate deploy shell scripts
        run: |
          docker run --rm -v "${{ github.workspace }}/crm-infra/deploy/remote/bootstrap-server.sh:/bootstrap.sh:ro" bash:5 bash -n /bootstrap.sh
          docker run --rm -v "${{ github.workspace }}/crm-infra/deploy/remote/deploy-component.sh:/deploy.sh:ro" bash:5 bash -n /deploy.sh

      - name: Prepare production env files
        shell: bash
        run: |
          cp .env.production.example .env.production
          cp ../crm-auth/.env.production.example ../crm-auth/.env.production
          cp ../crm-collab/.env.production.example ../crm-collab/.env.production
          cp ../crm-media/.env.production.example ../crm-media/.env.production
          cp ../crm-frontend/.env.production.example ../crm-frontend/.env.production
          mkdir -p deploy/runtime
          cat > deploy/runtime/edge.conf <<'EOF'
          server {
              listen 80;
              server_name _;
              location / {
                  return 200 'edge-ready';
                  add_header Content-Type text/plain;
              }
          }
          EOF
          cat > deploy/runtime/auth.blue.env <<'EOF'
          DATABASE_URL=postgres://root:ci-postgres-password@host.docker.internal:5432/crm_database
          REDIS_URL=redis://host.docker.internal:6379
          EOF
          cat > deploy/runtime/collab.blue.env <<'EOF'
          DATABASE_URL=postgres://root:ci-postgres-password@host.docker.internal:5432/crm_database
          MOD_AUTH_URL=http://auth:3000
          MOD_MEDIA_URL=http://media:3002
          EOF
          cat > deploy/runtime/media.blue.env <<'EOF'
          DATABASE_URL=postgres://root:ci-postgres-password@host.docker.internal:5432/crm_database
          CLAMAV_HOST=host.docker.internal
          CLAMAV_PORT=3310
          MOD_COLLAB_URL=http://collab:3001
          EOF

      - name: Build KrakenD config
        env:
          CIMA_AUTH_PATH: ${{ github.workspace }}/crm-auth
          CIMA_COLLAB_PATH: ${{ github.workspace }}/crm-collab
        run: pnpm gateway:build --output deploy/runtime/krakend.blue.json

      - name: Validate Docker Compose
        run: docker compose -f docker-compose.yml config > /dev/null

      - name: Validate production Shared Compose
        run: docker compose -f docker-compose.prod.yml config > /dev/null

      - name: Validate production Slot Compose
        run: docker compose -f docker-compose.slot.prod.yml config > /dev/null

      - name: Assert runtime gateway config
        run: test -f deploy/runtime/krakend.blue.json
