# Generated dynamically from registry/services.json. DO NOT EDIT.
include:
  - path: ../crm-auth/docker-compose.yml
  - path: ../crm-collab/docker-compose.yml
  - path: ../crm-media/docker-compose.yml
  - path: ../crm-frontend/docker-compose.yml
  - path: ../crm-marketing/docker-compose.yml
services:
  postgres_db:
    build:
      context: .
      dockerfile: ./scripts/Postgres.dockerfile
    restart: unless-stopped
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: rootpassword
      POSTGRES_DB: crm_database
      AUTH_DB_PASSWORD: ${AUTH_DB_PASSWORD:-authpassword}
      COLLAB_DB_PASSWORD: ${COLLAB_DB_PASSWORD:-collabpassword}
      MEDIA_DB_PASSWORD: ${MEDIA_DB_PASSWORD:-mediapassword}
      MARKETING_DB_PASSWORD: ${MARKETING_DB_PASSWORD:-marketingpassword}
    ports:
      - ${POSTGRES_HOST_PORT:-15432}:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/00-init-service-schemas.sh:/docker-entrypoint-initdb.d/00-init-service-schemas.sh:ro
      - ./registry:/registry:ro
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U root -d crm_database
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - shared_backplane
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --appendfsync everysec
    ports:
      - ${REDIS_HOST_PORT:-16379}:6379
    volumes:
      - redis_data:/data
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - shared_backplane
  clamav-scanner:
    image: ${CLAMAV_IMAGE:-clamav/clamav-debian:1.4}
    restart: unless-stopped
    ports:
      - ${CLAMAV_HOST_PORT:-13310}:3310
    healthcheck:
      test:
        - CMD-SHELL
        - echo PING | nc localhost 3310 | grep -q PONG
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    networks:
      - shared_backplane
  krakend-config:
    image: ${NODE_IMAGE:-node:22-alpine}
    init: true
    working_dir: /workspace
    environment:
      KRAKEND_AUTH_HOST: ${KRAKEND_AUTH_HOST:-http://crm-auth:3000}
      KRAKEND_COLLAB_HOST: ${KRAKEND_COLLAB_HOST:-http://crm-collab:3001}
      KRAKEND_MEDIA_HOST: ${KRAKEND_MEDIA_HOST:-http://crm-media:3002}
      KRAKEND_MARKETING_HOST: ${KRAKEND_MARKETING_HOST:-http://crm-marketing:3003}
      KRAKEND_ENDPOINTS_SOURCE: http
    volumes:
      - ./gateway:/workspace/gateway:ro
      - ./registry:/workspace/registry:ro
      - krakend_config:/output
    command:
      - node
      - gateway/build-krakend.mjs
      - --output
      - /output/krakend.json
    depends_on:
      crm-auth:
        condition: service_healthy
      crm-collab:
        condition: service_healthy
      crm-media:
        condition: service_healthy
      crm-marketing:
        condition: service_healthy
    networks:
      - shared_backplane
  api-gateway:
    image: ${KRAKEND_IMAGE:-devopsfaith/krakend:2.9}
    restart: unless-stopped
    ports:
      - ${GATEWAY_HOST_PORT:-18080}:8080
    volumes:
      - krakend_config:/etc/krakend:ro
    command:
      - run
      - -c
      - /etc/krakend/krakend.json
    depends_on:
      krakend-config:
        condition: service_completed_successfully
    networks:
      - shared_backplane
volumes:
  postgres_data: null
  redis_data: null
  krakend_config: null
networks:
  shared_backplane:
    name: cima-crm-local-backplane
    driver: bridge
