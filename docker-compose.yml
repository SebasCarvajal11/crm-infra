services:
  # Tu base de datos actual
  postgres_db:
    container_name: crm_postgres_db
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: rootpassword
      POSTGRES_DB: crm_database
    ports:
      - "5432:5432"
    volumes:
      - pgdata_local:/var/lib/postgresql/data

  # Redis — cola de emails BullMQ para mod-auth (y otros servicios si lo necesitan).
  # Desde el host (Node en tu maquina): REDIS_URL=redis://127.0.0.1:6379
  # Desde otro contenedor en esta red: REDIS_URL=redis://redis:6379
  redis:
    image: redis:7-alpine
    container_name: crm_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    # Sin persistencia: cola de emails no necesita sobrevivir a reinicios del daemon.
    command: redis-server --save "" --appendonly no
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # --- API Gateway (KrakenD): único punto de entrada del SPA hacia los MS ---
  # Requiere mod-auth escuchando en el host :3000 (npm start en mod-auth).
  # El contenedor usa host.docker.internal para alcanzar ese proceso.
  api-gateway:
    image: krakend:latest
    container_name: crm_krakend_gateway
    ports:
      - "8080:8080"
    volumes:
      - ./krakend.json:/etc/krakend/krakend.json:ro
      - ./gateway/output:/etc/krakend/static:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - postgres_db

volumes:
  pgdata_local: