services:
  # Tu base de datos actual
  postgres_db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: rootpassword
      POSTGRES_DB: crm_database
    ports:
      - "${POSTGRES_HOST_PORT:-15432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Redis — cola de emails BullMQ para mod-auth (y otros servicios si lo necesitan).
  # Desde el host (Node en tu maquina): REDIS_URL=redis://127.0.0.1:6379
  # Desde otro contenedor en esta red: REDIS_URL=redis://redis:6379
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_HOST_PORT:-16379}:6379"
    # Sin persistencia: cola de emails no necesita sobrevivir a reinicios del daemon.
    command: redis-server --save "" --appendonly no
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  clamav-scanner:
    image: clamav/clamav-debian:latest
    restart: unless-stopped
    ports:
      - "${CLAMAV_HOST_PORT:-13310}:3310"

  # --- API Gateway (KrakenD): único punto de entrada del SPA hacia los MS ---
  # Requiere crm-auth escuchando en el host :3000 (pnpm dev o pnpm start en crm-auth).
  # El contenedor usa host.docker.internal para alcanzar ese proceso.
  api-gateway:
    image: krakend:latest
    ports:
      - "${GATEWAY_HOST_PORT:-18080}:8080"
    volumes:
      - ./krakend.json:/etc/krakend/krakend.json:ro
      - ./gateway/output:/etc/krakend/static:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - postgres_db
      - clamav-scanner

volumes:
  postgres_data:
