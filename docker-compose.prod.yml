services:
  postgres_db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-root}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-crm_database}
    ports:
      - "127.0.0.1:${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-root} -d ${POSTGRES_DB:-crm_database}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --save "" --appendonly no
    ports:
      - "127.0.0.1:${REDIS_HOST_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  clamav-scanner:
    image: clamav/clamav-debian:latest
    restart: always
    ports:
      - "127.0.0.1:${CLAMAV_HOST_PORT:-3310}:3310"
    volumes:
      - clamav_data_prod:/var/lib/clamav

  edge-proxy:
    image: nginx:1.27-alpine
    restart: always
    depends_on:
      - postgres_db
      - redis
      - clamav-scanner
    network_mode: host
    volumes:
      - ./deploy/runtime/edge.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

volumes:
  postgres_data_prod:
    name: crm-infra_postgres_data_prod
  clamav_data_prod:
    name: crm-infra_clamav_data_prod
