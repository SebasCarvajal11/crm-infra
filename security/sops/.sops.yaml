# SOPS configuration for CIMA CRM
# Docs: https://github.com/getsops/sops
#
# The age public key below is a PLACEHOLDER. Replace it with your real
# public key after running:  age-keygen -o crm-infra/security/sops/keys.txt
#
# The private key (keys.txt) must NEVER be committed. Store it as:
#   - GitHub Secret: SOPS_AGE_KEY
#   - Local dev: ~/.config/sops/age/keys.txt

creation_rules:
  - path_regex: \.env\.enc$
    age: >-
      age1REPLACE_ME_WITH_YOUR_REAL_AGE_PUBLIC_KEY

  - path_regex: \.json\.enc$
    age: >-
      age1REPLACE_ME_WITH_YOUR_REAL_AGE_PUBLIC_KEY
