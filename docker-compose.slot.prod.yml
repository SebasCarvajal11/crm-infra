services:
  auth:
    build:
      context: ../crm-auth
    restart: always
    env_file:
      - ../crm-auth/.env.production
      - ./deploy/runtime/auth.${APP_SLOT:?APP_SLOT is required}.env
    networks:
      - default
      - shared_backplane
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 20s
      timeout: 5s
      retries: 10

  auth-email-worker:
    build:
      context: ../crm-auth
    restart: always
    command: ["pnpm", "worker:email"]
    healthcheck:
      disable: true
    env_file:
      - ../crm-auth/.env.production
      - ./deploy/runtime/auth.${APP_SLOT:?APP_SLOT is required}.env
    networks:
      - default
      - shared_backplane
    depends_on:
      auth:
        condition: service_healthy

  auth-identity-outbox-worker:
    build:
      context: ../crm-auth
    restart: always
    command: ["pnpm", "worker:identity-outbox"]
    healthcheck:
      disable: true
    env_file:
      - ../crm-auth/.env.production
      - ./deploy/runtime/auth.${APP_SLOT:?APP_SLOT is required}.env
    networks:
      - default
      - shared_backplane
    depends_on:
      auth:
        condition: service_healthy

  auth-token-cleanup-worker:
    build:
      context: ../crm-auth
    restart: always
    command: ["pnpm", "worker:cleanup"]
    healthcheck:
      disable: true
    env_file:
      - ../crm-auth/.env.production
      - ./deploy/runtime/auth.${APP_SLOT:?APP_SLOT is required}.env
    networks:
      - default
      - shared_backplane
    depends_on:
      auth:
        condition: service_healthy

  media:
    build:
      context: ../crm-media
    restart: always
    env_file:
      - ../crm-media/.env.production
      - ./deploy/runtime/media.${APP_SLOT:?APP_SLOT is required}.env
    networks:
      - default
      - shared_backplane
    volumes:
      - /opt/cima/secrets:/opt/cima/secrets:ro
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3002/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 20s
      timeout: 5s
      retries: 10

  collab:
    build:
      context: ../crm-collab
    restart: always
    env_file:
      - ../crm-collab/.env.production
      - ./deploy/runtime/collab.${APP_SLOT:?APP_SLOT is required}.env
    networks:
      - default
      - shared_backplane
    volumes:
      - /opt/cima/secrets:/opt/cima/secrets:ro
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3001/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 20s
      timeout: 5s
      retries: 10

  media-command-worker:
    build:
      context: ../crm-media
    restart: always
    command: ["pnpm", "worker:media-commands"]
    healthcheck:
      disable: true
    env_file:
      - ../crm-media/.env.production
      - ./deploy/runtime/media.${APP_SLOT:?APP_SLOT is required}.env
    networks:
      - default
      - shared_backplane
    volumes:
      - /opt/cima/secrets:/opt/cima/secrets:ro
    depends_on:
      media:
        condition: service_healthy

  media-quarantine-scan-worker:
    build:
      context: ../crm-media
    restart: always
    command: ["pnpm", "worker:quarantine-scan"]
    healthcheck:
      disable: true
    env_file:
      - ../crm-media/.env.production
      - ./deploy/runtime/media.${APP_SLOT:?APP_SLOT is required}.env
    networks:
      - default
      - shared_backplane
    volumes:
      - /opt/cima/secrets:/opt/cima/secrets:ro
    depends_on:
      media:
        condition: service_healthy

  api-gateway:
    image: krakend:latest
    restart: always
    ports:
      - "127.0.0.1:${GATEWAY_SLOT_HOST_PORT:?GATEWAY_SLOT_HOST_PORT is required}:8080"
    volumes:
      - ./deploy/runtime/krakend.${APP_SLOT:?APP_SLOT is required}.json:/etc/krakend/krakend.json:ro
    networks:
      - default

  frontend:
    build:
      context: ../crm-frontend
    restart: always
    ports:
      - "127.0.0.1:${FRONTEND_SLOT_HOST_PORT:?FRONTEND_SLOT_HOST_PORT is required}:80"
    depends_on:
      api-gateway:
        condition: service_started
    networks:
      - default

networks:
  shared_backplane:
    external: true
    name: crm-shared-backplane
